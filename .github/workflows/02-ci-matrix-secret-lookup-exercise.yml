name: 02 CI Matrix Secret Lookup

on:
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - version_secret: PYTHON_311
          - version_secret: PYTHON_312

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ secrets[matrix.version_secret] }}

      - name: Run tests
        run: python -m unittest discover -s tests -v