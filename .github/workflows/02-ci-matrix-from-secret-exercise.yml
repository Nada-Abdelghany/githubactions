name: 02 CI Matrix From Secret

on:
  workflow_dispatch:

jobs:
  prepare-matrix:
    runs-on: ubuntu-latest

    outputs:
      versions: ${{ steps.set-matrix.outputs.versions }}

    steps:
      - name: Read versions from secret
        id: set-matrix
        run: |
          echo "versions=${{ secrets.PYTHON_VERSION }}" >> $GITHUB_OUTPUT

  run-tests:
    runs-on: ubuntu-latest
    needs: prepare-matrix

    strategy:
      matrix:
        python-version: ${{ fromJSON(needs.prepare-matrix.outputs.versions) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        run: python -m unittest discover -s tests -v